<main class="nf-shell" aria-labelledby="nf-title">
  <section class="nf-card" role="region" aria-label="Página no encontrada">

    <aside class="nf-brand" aria-hidden="true">
      <p class="brand-pill">Banca personal inteligente</p>
      <h1 class="logo">WealthGuard</h1>
      <p class="descripcion">
        Protege tu patrimonio con visibilidad total de tus movimientos y presupuestos.
      </p>
      <ul class="caracteristicas">
        <li>Seguridad cifrada</li>
        <li>Análisis en tiempo real</li>
        <li>Soporte experto</li>
      </ul>
    </aside>

    <section class="nf-panel">
      <div class="numero-404" aria-hidden="true">
        <span class="fondo-404">404</span>
        <span class="icono-error">⊙</span>
      </div>

      <h2 id="nf-title">Algo no cuadra</h2>
      <p class="nf-descripcion">
        La dirección que buscas no existe o ha sido movida. ¿Desea que lo guiemos de vuelta?
      </p>

      <div class="acciones">
        <button type="button" class="btn-primario" (click)="irAlPanel()">
          Volver al Panel General
        </button>
        <button type="button" class="btn-secundario" (click)="irAlLogin()">
          Ir al Login
        </button>
      </div>
    </section>

  </section>
</main>
