<div class="modal-overlay" (click)="cancelar.emit()">
  
  <div class="modal-content card" (click)="$event.stopPropagation()">
    
    <h3>{{ esEdicion ? 'Editar Movimiento' : 'Nuevo Movimiento' }}</h3>
    
    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="tipo-selector">
        <label [class.activo]="form.get('tipoTransaccion')?.value === true" class="radio-btn ingreso">
          <input type="radio" formControlName="tipoTransaccion" [value]="true"> 
          <span class="material-symbols-outlined">arrow_upward</span> Ingreso
        </label>
        
        <label [class.activo]="form.get('tipoTransaccion')?.value === false" class="radio-btn gasto">
          <input type="radio" formControlName="tipoTransaccion" [value]="false"> 
          <span class="material-symbols-outlined">arrow_downward</span> Gasto
        </label>
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <input type="text" formControlName="descripcion" placeholder="Ej: Compra semanal, Nómina...">
      </div>

      <div class="row">
        <div class="form-group half">
          <label>Monto (€)</label>
          <input type="number" formControlName="cantidad" placeholder="0.00" step="0.01">
        </div>

        <div class="form-group half">
          <label>Fecha</label>
          <input type="date" formControlName="fecha">
        </div>
      </div>

      <div class="form-group">
        <label>Categoría</label>
        <select formControlName="idCategoria">
          <option value="" disabled>Selecciona una categoría</option>
          <option *ngFor="let cat of categoriasLista" [value]="cat.id">
            {{ cat.nombre }}
          </option>
        </select>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-cancelar" (click)="cancelar.emit()">Cancelar</button>
        <button type="submit" class="btn-guardar" [disabled]="form.invalid">
          {{ esEdicion ? 'Actualizar' : 'Guardar' }}
        </button>
      </div>

    </form>
  </div>
</div>
