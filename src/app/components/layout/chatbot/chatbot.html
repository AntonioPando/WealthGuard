<!-- Botón flotante -->
<button class="chat-fab" (click)="toggleChat()" [class.abierto]="abierto" aria-label="Abrir asistente">
  <span class="chat-fab-icon">{{ abierto ? '✕' : '💬' }}</span>
</button>

<!-- Ventana de chat -->
<div class="chat-ventana" [class.visible]="abierto">

  <div class="chat-header">
    <div class="chat-header-info">
      <div class="chat-avatar">🤖</div>
      <div>
        <p class="chat-nombre">Asistente WealthGuard</p>
        <p class="chat-estado">En línea</p>
      </div>
    </div>
    <button class="chat-cerrar" (click)="cerrar()">✕</button>
  </div>

  <div class="chat-mensajes" #mensajesContainer>
    <div
      *ngFor="let m of mensajes"
      class="chat-mensaje"
      [class.usuario]="m.esUsuario"
      [class.bot]="!m.esUsuario">
      <div class="chat-burbuja">{{ m.texto }}</div>
      <span class="chat-hora">{{ m.hora | date:'HH:mm' }}</span>
    </div>

    <div class="chat-mensaje bot" *ngIf="cargando">
      <div class="chat-burbuja chat-typing">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="chat-input-area">
    <input
      type="text"
      class="chat-input"
      [(ngModel)]="textoUsuario"
      (keydown)="onEnter($event)"
      placeholder="Escribe un mensaje..."
      [disabled]="cargando" />
    <button class="chat-enviar" (click)="enviar()" [disabled]="!textoUsuario.trim() || cargando">
      ➤
    </button>
  </div>

</div>
